<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;padding:20px}
.wrap{max-width:520px;margin:0 auto}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:22px;margin-bottom:16px}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#777;margin-bottom:18px}
.tab-row{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:9px;font-size:13px;font-weight:500;border:1px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;color:#666;transition:.15s}
.tab.on{background:#e8f0fe;color:#1a5cd6;border-color:transparent}
input,textarea{width:100%;padding:10px 13px;border:1px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#fff;color:#1a1a1a;outline:none;transition:.15s}
input:focus,textarea:focus{border-color:#1a5cd6}
input[type="file"]{padding:8px;background:#f9f9f9}
button{width:100%;padding:10px;font-size:14px;font-weight:500;border:1px solid #ccc;border-radius:10px;cursor:pointer;background:#fff;color:#1a1a1a;transition:.15s}
button:hover{background:#f0f0f0}
button.primary{background:#1a5cd6;color:#fff;border-color:transparent}
button.primary:hover{background:#1450bb}
button.danger{background:#fff0f0;color:#c0392b;border-color:#f5c0c0}
button.danger:hover{background:#ffe0e0}
button.sm{width:auto;padding:5px 12px;font-size:12px}
.slot{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.slot-num{font-size:11px;color:#aaa;min-width:18px;text-align:center}
.slot-info{flex:1;min-width:0}
.slot-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-meta{font-size:11px;color:#999;margin-top:2px}
.slot-empty{font-size:12px;color:#bbb;font-style:italic}
.slot-actions{display:flex;gap:6px}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;display:inline-block}
.binfo{background:#e8f0fe;color:#1a5cd6}
.bwarn{background:#fff3cd;color:#856404}
.bok{background:#d4edda;color:#155724}
.berr{background:#f8d7da;color:#721c24}
.err{font-size:12px;color:#c0392b;margin-top:4px}
.ok{font-size:12px;color:#27ae60;margin-top:4px}
.sep{border:none;border-top:1px solid #eee;margin:14px 0}
.prog{height:5px;background:#eee;border-radius:4px;margin-bottom:16px;overflow:hidden}
.progb{height:100%;background:#1a5cd6;border-radius:4px;transition:width .3s}
.room-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.avatar{width:40px;height:40px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:16px;color:#1a5cd6;font-weight:700;flex-shrink:0}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.back-row button{width:auto;padding:7px 12px}
.room-list-item{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:10px 14px;margin-bottom:8px}
.room-list-name{font-size:13px;font-weight:600}
.room-list-meta{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>
<script>
const MAX = 5;
let S = { view: 'home', room: null, own: false };

function loadR() {
  try { return JSON.parse(localStorage.getItem('sr_rooms') || '{}'); } catch { return {}; }
}
function saveR(d) { localStorage.setItem('sr_rooms', JSON.stringify(d)); }
function ts() {
  return new Date().toLocaleString('th-TH', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
}
function fmtSz(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b / 1024) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function render() {
  const a = document.getElementById('app');
  if (S.view === 'home') a.innerHTML = homeHTML();
  else a.innerHTML = roomHTML();
}

function homeHTML() {
  const R = loadR();
  const cnt = Object.keys(R).length;
  const rows = cnt === 0
    ? '<div style="font-size:13px;color:#bbb">ยังไม่มีห้อง</div>'
    : Object.entries(R).map(([k, r]) => `
      <div class="room-list-item">
        <div class="room-list-name">🔒 ${k}</div>
        <div class="room-list-meta">${r.items.length}/${MAX} รายการ · สร้างเมื่อ ${r.created}</div>
      </div>`).join('');
  return `
  <div class="card">
    <h1>🔐 Secure Room</h1>
    <div class="sub">แชร์ไฟล์และข้อความแบบมีรหัสผ่าน · สูงสุด ${MAX} รายการต่อห้อง</div>
    <div class="tab-row">
      <button class="tab on" id="tc" onclick="sw('c')">➕ สร้างห้อง</button>
      <button class="tab" id="tj" onclick="sw('j')">🚪 เข้าห้อง</button>
    </div>
    <div id="cp">
      <input id="cn" placeholder="ชื่อห้อง เช่น myroom123"/>
      <input id="cpw" type="password" placeholder="รหัสผ่าน"/>
      <button class="primary" onclick="createR()">สร้างห้อง</button>
      <div id="cm"></div>
    </div>
    <div id="jp" style="display:none">
      <input id="jn" placeholder="ชื่อห้อง"/>
      <input id="jpw" type="password" placeholder="รหัสผ่าน"/>
      <button class="primary" onclick="joinR()">เข้าห้อง</button>
      <div id="jm"></div>
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;color:#999;margin-bottom:10px">ห้องในระบบ: ${cnt} ห้อง</div>
    ${rows}
  </div>`;
}

function sw(t) {
  document.getElementById('cp').style.display = t === 'c' ? 'block' : 'none';
  document.getElementById('jp').style.display = t === 'j' ? 'block' : 'none';
  document.getElementById('tc').className = 'tab' + (t === 'c' ? ' on' : '');
  document.getElementById('tj').className = 'tab' + (t === 'j' ? ' on' : '');
}

function createR() {
  const n = document.getElementById('cn').value.trim();
  const p = document.getElementById('cpw').value;
  const m = document.getElementById('cm');
  if (!n || !p) { m.innerHTML = '<div class="err">กรุณากรอกชื่อห้องและรหัสผ่าน</div>'; return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(n)) { m.innerHTML = '<div class="err">ชื่อห้องใช้ได้แค่ a-z, 0-9, -, _</div>'; return; }
  const R = loadR();
  if (R[n]) { m.innerHTML = '<div class="err">ชื่อห้องนี้มีอยู่แล้ว</div>'; return; }
  R[n] = { pass: p, items: [], created: ts() };
  saveR(R);
  S = { view: 'room', room: n, own: true };
  render();
}

function joinR() {
  const n = document.getElementById('jn').value.trim();
  const p = document.getElementById('jpw').value;
  const m = document.getElementById('jm');
  const R = loadR();
  if (!R[n]) { m.innerHTML = '<div class="err">ไม่พบห้องนี้</div>'; return; }
  if (R[n].pass !== p) { m.innerHTML = '<div class="err">รหัสผ่านไม่ถูกต้อง</div>'; return; }
  S = { view: 'room', room: n, own: false };
  render();
}

function roomHTML() {
  const R = loadR();
  const room = R[S.room];
  if (!room) { S.view = 'home'; render(); return ''; }
  const items = room.items;
  const pct = Math.round(items.length / MAX * 100);
  const slots = Array.from({ length: MAX }, (_, i) => {
    const it = items[i];
    if (!it) return `<div class="slot"><div class="slot-num">${i+1}</div><div class="slot-empty">ว่าง</div></div>`;
    return `<div class="slot">
      <div class="slot-num">${i+1}</div>
      <div class="slot-info">
        <div class="slot-name">${it.name}</div>
        <div class="slot-meta">${it.type==='file'?'📄 ไฟล์ · '+fmtSz(it.size):'💬 ข้อความ'} · ${it.ts}</div>
      </div>
      <div class="slot-actions">
        ${it.type==='text'?`<button class="sm" onclick="cpyIt(${i})">📋 Copy</button>`:''}
        ${it.type==='file'?`<button class="sm" onclick="dlIt(${i})">⬇️ ดาวน์โหลด</button>`:''}
        ${S.own?`<button class="sm danger" onclick="delIt(${i})">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');
  return `
  <div class="back-row">
    <button onclick="goHome()">← กลับ</button>
    <div class="room-header" style="margin:0;flex:1">
      <div class="avatar">${S.room[0].toUpperCase()}</div>
      <div>
        <div style="font-size:15px;font-weight:600">${S.room}</div>
        <div style="font-size:12px;color:#999">${S.own?'👑 เจ้าของห้อง':'👤 ผู้เยี่ยมชม'} · ${items.length}/${MAX} slot</div>
      </div>
    </div>
    ${S.own?`<button class="danger sm" onclick="delRoom()">🗑️ ลบห้อง</button>`:''}
  </div>
  <div class="prog"><div class="progb" style="width:${pct}%"></div></div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">
      รายการในห้อง ${items.length>0?`<span class="badge binfo">${items.length}/${MAX}</span>`:''}
      ${items.length>=MAX?'<span class="badge bwarn" style="margin-left:6px">เต็ม</span>':''}
    </div>
    ${slots}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px">
      เพิ่มรายการ
      ${items.length>=MAX?'<span class="badge bwarn" style="margin-left:6px">อันใหม่จะดันอันแรกออก</span>':''}
    </div>
    <div style="font-size:12px;color:#999;margin-bottom:6px;font-weight:600">💬 ข้อความ</div>
    <textarea id="txtin" rows="3" placeholder="พิมพ์ข้อความ..." style="resize:vertical"></textarea>
    <input id="txtlbl" placeholder="ชื่อ / label (ไม่บังคับ)"/>
    <button class="primary" onclick="addTxt()" style="margin-bottom:4px">+ เพิ่มข้อความ</button>
    <div class="sep"></div>
    <div style="font-size:12px;color:#999;margin-bottom:6px;font-weight:600">📄 ไฟล์</div>
    <input type="file" id="filein"/>
    <button class="primary" onclick="addFile()" style="margin-top:8px;margin-bottom:4px">⬆️ อัปโหลดไฟล์</button>
    <div id="rmsg"></div>
  </div>`;
}

function goHome() { S = { view: 'home', room: null, own: false }; render(); }

function addTxt() {
  const txt = document.getElementById('txtin').value.trim();
  const lbl = document.getElementById('txtlbl').value.trim();
  if (!txt) { showM('<div class="err">กรุณาพิมพ์ข้อความ</div>'); return; }
  const R = loadR();
  const room = R[S.room];
  room.items.push({ type: 'text', name: lbl || txt.substring(0, 30) + (txt.length > 30 ? '...' : ''), content: txt, ts: ts() });
  if (room.items.length > MAX) room.items.shift();
  saveR(R); render();
}

function addFile() {
  const f = document.getElementById('filein').files[0];
  if (!f) { showM('<div class="err">กรุณาเลือกไฟล์</div>'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const R = loadR();
    const room = R[S.room];
    room.items.push({ type: 'file', name: f.name, size: f.size, data: e.target.result, ts: ts() });
    if (room.items.length > MAX) room.items.shift();
    saveR(R); render();
  };
  reader.readAsDataURL(f);
}

function cpyIt(i) {
  const R = loadR();
  const it = R[S.room].items[i];
  if (it?.content) { navigator.clipboard.writeText(it.content); showM('<div class="ok">✅ คัดลอกแล้ว!</div>'); }
}

function dlIt(i) {
  const R = loadR();
  const it = R[S.room].items[i];
  if (it?.data) { const a = document.createElement('a'); a.href = it.data; a.download = it.name; a.click(); }
}

function delIt(i) {
  if (!confirm('ลบรายการนี้?')) return;
  const R = loadR(); R[S.room].items.splice(i, 1); saveR(R); render();
}

function delRoom() {
  if (!confirm('ลบห้อง "' + S.room + '" และข้อมูลทั้งหมด?')) return;
  const R = loadR(); delete R[S.room]; saveR(R); goHome();
}

function showM(h) {
  const e = document.getElementById('rmsg');
  if (e) { e.innerHTML = h; setTimeout(() => e.innerHTML = '', 2500); }
}

render();
</script>
</body>
</html>
